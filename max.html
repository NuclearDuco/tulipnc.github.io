<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stand Max – TulipNC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d1117;
            color: #f0f0f0;
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #e8c84a;
            text-shadow: 0 0 30px rgba(232, 200, 74, 0.4);
            margin-bottom: 40px;
            font-weight: 700;
        }

        .image-container {
            max-width: 900px;
            width: 100%;
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
            border: 2px solid rgba(232, 200, 74, 0.3);
            border-radius: 4px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body>
    <h1>Stand Max</h1>
    <div class="image-container">
        <img src="StandMax20FEB2026.png" alt="Stand Max 20 februari 2026">
    </div>
</body>
</html>
